# ~/.config/keystone/config.yaml
#
# Optional top-level keys:
#   https_proxy: "http://proxy.corp:8080"
#   ca_bundle:   "~/certs/corp-ca.pem"

tenants:
  # Azure tenant with single PIM role
  - name: PROD
    provider: azure
    enabled: true
    tenant_id: "00000000-0000-0000-0000-000000000000"
    config_dir: "~/.azure/prod"
    pim:
      role: "Contributor"
      # role_guid: ""          # optional — resolved automatically if omitted
      subscription: "00000000-0000-0000-0000-000000000000"
      duration: "PT4H"
      reason: "Daily ops"
      # claims_b64: ""         # optional — base64 claims challenge

  # Azure tenant with multiple PIM roles
  - name: STAGING
    provider: azure
    enabled: true
    tenant_id: "11111111-1111-1111-1111-111111111111"
    config_dir: "~/.azure/staging"
    pims:
      - role: "Reader"
        subscription: "11111111-1111-1111-1111-111111111111"
        duration: "PT8H"
      - role: "Contributor"
        subscription: "22222222-2222-2222-2222-222222222222"
        duration: "PT4H"

  # AWS SSO
  - name: AWS-PROD
    provider: aws-sso
    enabled: true
    profile: "prod"
    sso_start_url: "https://myorg.awsapps.com/start"
    sso_region: "us-east-1"

  # Disabled tenant (skipped)
  - name: LEGACY
    provider: azure
    enabled: false
    tenant_id: "ffffffff-ffff-ffff-ffff-ffffffffffff"
